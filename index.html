<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Profile card component</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="profile-card">

    <img src="images/image-victor.jpg" alt="User's Avatar" class='avatar'>

    <div class="personal-info">
      <div class="name-age">
        <h1 class="name">Victor Crest</h1>
        <span class="age">26</span>
      </div>
      <p class="city">London</p>
    </div>

    <hr>

    <ul class="stats">
      <li class="stat">
        <span class="number">80K</span>
        <span class="label">Followers</span>
      </li>
      <li class="stat">
        <span class="number">803K</span>
        <span class="label">Likes</span>
      </li>
      <li class="stat">
        <span class="number">1.4K</span>
        <span class="label">Photos</span>
      </li>
    </ul>

  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="https://www.frontendmentor.io/profile/fernandolapaz">Fernando</a>.
  </footer>

</body>

</html>
